const { useRef, useEffect, useState } = React;
const { motion, AnimatePresence } = window.Motion;

// ─────────────────────────────────────────────
// Suppress benign Framer Motion list-key warnings
// ─────────────────────────────────────────────
const _origError = console.error;
console.error = (...a) => {
  if (typeof a[0] === 'string' && a[0].includes('Each child in a list')) return;
  _origError.apply(console, a);
};

// ─────────────────────────────────────────────
// FadingVideo  — rAF-driven crossfade, no CSS transitions
// ─────────────────────────────────────────────
const FADE_MS       = 500;
const FADE_OUT_LEAD = 0.55;

function FadingVideo({ src, className, style }) {
  const videoRef     = useRef(null);
  const rafRef       = useRef(null);
  const fadingOutRef = useRef(false);

  function fadeTo(video, target) {
    cancelAnimationFrame(rafRef.current);
    const from  = parseFloat(video.style.opacity) || 0;
    const t0    = performance.now();
    const tick  = (now) => {
      const p = Math.min((now - t0) / FADE_MS, 1);
      video.style.opacity = String(from + (target - from) * p);
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
  }

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    video.style.opacity = '0';

    const onLoadedData = () => {
      video.style.opacity = '0';
      video.play().catch(() => {});
      fadeTo(video, 1);
    };
    const onTimeUpdate = () => {
      if (fadingOutRef.current) return;
      const rem = video.duration - video.currentTime;
      if (rem <= FADE_OUT_LEAD && rem > 0) {
        fadingOutRef.current = true;
        fadeTo(video, 0);
      }
    };
    const onEnded = () => {
      video.style.opacity = '0';
      setTimeout(() => {
        video.currentTime = 0;
        video.play().catch(() => {});
        fadingOutRef.current = false;
        fadeTo(video, 1);
      }, 100);
    };

    video.addEventListener('loadeddata',  onLoadedData);
    video.addEventListener('timeupdate',  onTimeUpdate);
    video.addEventListener('ended',       onEnded);
    if (video.readyState >= 3) onLoadedData();

    return () => {
      cancelAnimationFrame(rafRef.current);
      video.removeEventListener('loadeddata',  onLoadedData);
      video.removeEventListener('timeupdate',  onTimeUpdate);
      video.removeEventListener('ended',       onEnded);
    };
  }, [src]);

  return (
    <video
      ref={videoRef}
      src={src}
      autoPlay
      muted
      playsInline
      preload="auto"
      className={className}
      style={{ ...style, opacity: 0 }}
    />
  );
}

// ─────────────────────────────────────────────
// BlurText — word-by-word blur-in on IntersectionObserver
// ─────────────────────────────────────────────
function BlurText({ text, className }) {
  const ref    = useRef(null);
  const [inView, setInView] = useState(false);

  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setInView(true); },
      { threshold: 0.1 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  const words = text.split(' ');

  return (
    <p
      ref={ref}
      className={className}
      style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}
    >
      {words.map((word, i) => (
        <motion.span
          key={i}
          initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
          animate={inView ? {
            filter:  ['blur(10px)', 'blur(5px)', 'blur(0px)'],
            opacity: [0, 0.5, 1],
            y:       [50, -5, 0],
          } : {}}
          transition={{ delay: (i * 100) / 1000, duration: 0.7, times: [0, 0.5, 1], ease: 'easeOut' }}
          style={{ display: 'inline-block', marginRight: '0.28em' }}
        >
          {word}
        </motion.span>
      ))}
    </p>
  );
}

  },
];

function CapabilitiesSection() {
  const serif = "'Instrument Serif', serif";
  const sans  = "'Barlow', sans-serif";

  return (
    <section style={{ position: 'relative', minHeight: '100vh', background: '#000', overflow: 'hidden' }}>
      {/* ── Background Video — full-bleed ── */}
      <FadingVideo
        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_094631_d30ab262-45ee-4b7d-99f3-5d5848c8ef13.mp4"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', zIndex: 0 }}
      />

      {/* ── Content ── */}
      <div style={{
        position: 'relative', zIndex: 10,
        padding: 'clamp(4rem, 8vw, 6rem) clamp(2rem, 6vw, 5rem) 2.5rem',
        display: 'flex', flexDirection: 'column', minHeight: '100vh',
      }}>
        {/* Header */}
        <div style={{ marginBottom: 'auto' }}>
          <p style={{ fontSize: '0.875rem', fontFamily: sans, color: 'rgba(255,255,255,0.8)', marginBottom: '1.5rem' }}>
            // Capabilities
          </p>
          <h2 style={{
            fontFamily: serif, fontStyle: 'italic', color: 'white',
            fontSize: 'clamp(3.5rem, 8vw, 6rem)',
            lineHeight: 0.9, letterSpacing: '-3px',
          }}>
            Production<br />evolved
          </h2>
        </div>

        {/* Cards grid */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))',
          gap: '1.5rem', marginTop: '4rem',
        }}>
          {CARDS.map(card => (
            <div key={card.title} className="liquid-glass" style={{
              borderRadius: '1.25rem', padding: '1.5rem',
              minHeight: 360, display: 'flex', flexDirection: 'column',
            }}>
              {/* Top row: icon + tags */}
              <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '1rem' }}>
                <div className="liquid-glass" style={{
                  width: 44, height: 44, borderRadius: '0.75rem',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  flexShrink: 0, color: 'white',
                }}>
                  {card.icon}
                </div>
                <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'flex-end', gap: '0.375rem', maxWidth: '70%' }}>
                  {card.tags.map(tag => (
                    <span key={tag} className="liquid-glass" style={{
                      borderRadius: '9999px',
                      padding: '0.25rem 0.75rem',
                      fontSize: 11, color: 'rgba(255,255,255,0.9)',
                      fontFamily: sans, whiteSpace: 'nowrap',
                    }}>{tag}</span>
                  ))}
                </div>
              </div>

              {/* Spacer */}
              <div style={{ flex: 1 }} />

              {/* Bottom: title + body */}
              <div style={{ marginTop: '1.5rem' }}>
                <h3 style={{
                  fontFamily: serif, fontStyle: 'italic', color: 'white',
                  fontSize: 'clamp(1.75rem, 3vw, 2.25rem)',
                  letterSpacing: '-1px', lineHeight: 1,
                }}>{card.title}</h3>
                <p style={{
                  marginTop: '0.75rem',
                  fontSize: '0.875rem', color: 'rgba(255,255,255,0.9)',
                  fontFamily: sans, fontWeight: 300, lineHeight: 1.5,
                  maxWidth: '32ch',
                }}>{card.body}</p>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ─────────────────────────────────────────────
// App
// ─────────────────────────────────────────────
function App() {
  return (
    <>
      <Navbar />
      <HeroSection />
      <CapabilitiesSection />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
