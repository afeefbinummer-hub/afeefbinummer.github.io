<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power AI — Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: hsl(260 87% 3%);
    --fg: hsl(40 6% 95%);
    --sub: hsl(40 6% 82%);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Liquid Glass ── */
  .lg {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .lg::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Video bg ── */
  .video-bg {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0;
    transition: none;
  }

  /* ── Blur overlay ── */
  .blur-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: min(984px, 90vw);
    height: 527px;
    opacity: 0.9;
    background: hsl(260 87% 3%);
    filter: blur(82px);
    z-index: 1;
    pointer-events: none;
  }

  /* ── Navbar ── */
  .nav {
    position: relative;
    z-index: 20;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .logo-icon {
    width: 2rem; height: 2rem;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 0.375rem;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 16px; height: 16px; }
  .logo-text {
    font-family: 'General Sans', sans-serif;
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--fg);
  }

  .nav-items {
    display: none;
    gap: 0.5rem;
    list-style: none;
  }
  @media(min-width:768px){ .nav-items { display: flex; } }
  .nav-items button {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    background: none;
    border: none;
    color: rgba(255,255,255,0.9);
    font-family: inherit;
    font-size: 0.875rem;
    cursor: pointer;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    transition: background 0.2s;
  }
  .nav-items button:hover { background: rgba(255,255,255,0.05); }
  .nav-items svg { width: 14px; height: 14px; opacity: 0.6; }

  .nav-signup {
    border-radius: 9999px;
    padding: 0.5rem 1.25rem;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--fg);
    border: none; cursor: pointer;
    font-family: inherit;
  }

  /* ── Divider ── */
  .nav-divider {
    position: relative;
    z-index: 20;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
    margin: 0 2rem;
  }

  /* ── Hero content ── */
  .hero-content {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }

  .hero-headline {
    font-family: 'General Sans', sans-serif;
    font-size: clamp(5rem, 18vw, 14rem);
    font-weight: 400;
    line-height: 1.02;
    letter-spacing: -0.024em;
    animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) both;
  }
  .word-power { color: var(--fg); }
  .word-ai {
    background: linear-gradient(to left, #6366f1, #a855f7, #fcd34d);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    color: var(--sub);
    font-size: 1.125rem;
    line-height: 2;
    max-width: 28rem;
    margin-top: 0.625rem;
    opacity: 0.8;
    animation: fadeUp 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
  }

  .hero-cta {
    margin-top: 1.5rem;
    border-radius: 9999px;
    padding: 1.5rem 1.8rem;
    font-size: 0.9375rem;
    font-weight: 500;
    color: var(--fg);
    border: none; cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s, transform 0.2s;
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.16,1,0.3,1) both;
  }
  .hero-cta:hover { opacity: 0.85; transform: scale(1.02); }

  /* ── Marquee ── */
  .marquee-section {
    position: relative;
    z-index: 20;
    padding-bottom: 2.5rem;
    animation: fadeUp 0.8s 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }
  .marquee-inner {
    max-width: 64rem;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 3rem;
  }
  @media(max-width:640px){ .marquee-inner { flex-direction: column; gap: 1rem; } }

  .marquee-label {
    font-size: 0.875rem;
    color: rgba(255,255,255,0.5);
    white-space: pre-line;
    line-height: 1.4;
    flex-shrink: 0;
  }

  .marquee-track-wrap {
    flex: 1;
    overflow: hidden;
    mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
  }
  .marquee-track {
    display: flex;
    gap: 4rem;
    width: max-content;
    animation: marquee 20s linear infinite;
  }
  .marquee-item {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    white-space: nowrap;
  }
  .logo-chip {
    width: 1.5rem; height: 1.5rem;
    border-radius: 0.375rem;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }
  .logo-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--fg);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  /* ── Mobile nav ── */
  .hamburger-btn {
    display: none;
    flex-direction: column; justify-content: center; align-items: center;
    gap: 5px; background: none; border: none; cursor: pointer;
    padding: 4px; min-height: 44px; min-width: 44px;
  }
  @media(max-width:767px){ .hamburger-btn { display: flex; } }
  .hamburger-btn span {
    display: block; width: 22px; height: 2px;
    background: rgba(255,255,255,0.9); border-radius: 2px;
  }
  .mobile-nav {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(8,2,20,0.98);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .mobile-nav.open { display: block; }
  .mobile-nav-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .mobile-nav-brand {
    font-family: 'General Sans', sans-serif;
    font-size: 1.125rem; font-weight: 600; color: var(--fg);
  }
  .mobile-nav-close {
    background: none; border: none;
    color: rgba(255,255,255,0.5); font-size: 1.4rem; cursor: pointer;
  }
  .mobile-nav-links { list-style: none; }
  .mobile-nav-links button {
    display: block; width: 100%; text-align: left;
    padding: 13px 0; background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.8); font-family: inherit;
    font-size: 0.9375rem;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .mobile-nav-links li:last-child button { border-bottom: none; }
  img { max-width: 100%; height: auto; }
</style>
</head>

<script>
  // ── Custom JS fade loop ──
  const vid = document.getElementById('bgVid');
  const FADE = 500, LEAD = 0.55;
  let raf = 0, fading = false;

  function fadeTo(target, ms) {
    cancelAnimationFrame(raf);
    const t0 = performance.now();
    const from = parseFloat(vid.style.opacity) || 0;
    function step(now) {
      const p = Math.min((now - t0) / ms, 1);
      vid.style.opacity = from + (target - from) * p;
      if (p < 1) raf = requestAnimationFrame(step);
    }
    raf = requestAnimationFrame(step);
  }

  vid.addEventListener('loadeddata', () => {
    vid.style.opacity = 0;
    vid.play().catch(() => {});
    fadeTo(1, FADE);
  });
  vid.addEventListener('timeupdate', () => {
    if (!fading && vid.duration && vid.duration - vid.currentTime <= LEAD) {
      fading = true; fadeTo(0, FADE);
    }
  });
  vid.addEventListener('ended', () => {
    vid.style.opacity = 0;
    setTimeout(() => {
      vid.currentTime = 0; vid.play().catch(() => {});
      fading = false; fadeTo(1, FADE);
    }, 100);
  });
</script>
