<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Securify — Data Security Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Readex Pro', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .hero {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    background: #000;
  }

  .video-bg {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* ── Navbar ── */
  .nav {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 20;
    padding: 1.5rem 2.5rem;
  }
  @media(max-width:640px){ .nav { padding: 1.25rem; } }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(23,23,23,0.9);
    backdrop-filter: blur(12px);
    border-radius: 9999px;
    padding: 0.75rem 1.5rem;
  }
  .nav-logo-icon {
    width: 20px; height: 20px;
  }
  .nav-brand {
    font-size: 0.875rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    text-transform: lowercase;
  }

  .nav-center {
    display: none;
    background: rgba(23,23,23,0.9);
    backdrop-filter: blur(12px);
    border-radius: 9999px;
    padding: 0.5rem 0.75rem;
    gap: 0.25rem;
  }
  @media(min-width:768px){ .nav-center { display: flex; } }
  .nav-center a {
    color: #d4d4d4;
    text-decoration: none;
    font-size: 0.875rem;
    padding: 0.5rem 1.25rem;
    border-radius: 9999px;
    transition: background 0.2s, color 0.2s;
  }
  .nav-center a:hover { background: rgba(255,255,255,0.05); color: #fff; }

  .nav-cta {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 9999px;
    padding: 0.75rem 1.5rem;
    font-size: 0.875rem;
    font-weight: 400;
    cursor: pointer;
    font-family: inherit;
    text-transform: lowercase;
    letter-spacing: 0;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: #e5e5e5; }

  /* ── Giant staggered words ── */
  .hero-title {
    position: absolute;
    font-size: clamp(3rem, 14vw, 13vw);
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.04em;
    line-height: 0.95;
    text-transform: lowercase;
    z-index: 10;
  }

  #word-protect {
    left: 2.5rem; top: 18%;
    animation: slideIn 0.7s 0.1s cubic-bezier(0.16,1,0.3,1) both;
  }
  #word-your {
    right: 2.5rem; top: 38%;
    text-align: right;
    animation: slideIn 0.7s 0.25s cubic-bezier(0.16,1,0.3,1) both;
  }
  #word-data {
    left: 18%; top: 58%;
    animation: slideIn 0.7s 0.4s cubic-bezier(0.16,1,0.3,1) both;
  }

  @media(max-width:640px){
    #word-protect { left: 1rem; }
    #word-your { right: 1rem; }
    #word-data { left: 1rem; }
  }

  /* ── Description ── */
  .hero-desc {
    position: absolute;
    left: 1.5rem; top: 46%;
    max-width: 240px;
    font-size: 0.9rem;
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
    z-index: 10;
    animation: fadeIn 0.8s 0.5s ease-out both;
  }
  @media(min-width:640px){ .hero-desc { left: 2.5rem; font-size: 0.95rem; } }

  /* ── Stats ── */
  .stat-block {
    position: absolute;
    z-index: 10;
    animation: fadeIn 0.8s ease-out both;
  }
  .stat-big {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    margin-top: 0.25rem;
    text-transform: lowercase;
  }
  .stat-divider {
    display: none;
    height: 1px;
    width: 6rem;
    background: rgba(255,255,255,0.4);
    transform: rotate(20deg);
  }
  @media(min-width:768px){ .stat-divider { display: inline-block; } }

  #stat-top {
    right: 1.5rem; top: 14%;
    text-align: right;
    animation-delay: 0.3s;
  }
  @media(min-width:768px){ #stat-top { right: 6rem; } }

  #stat-bottom-left {
    left: 1.5rem; bottom: 5.5rem;
    animation-delay: 0.45s;
  }
  @media(min-width:768px){ #stat-bottom-left { left: 5rem; bottom: 6rem; } }

  #stat-bottom-right {
    right: 1.5rem; bottom: 4rem;
    text-align: right;
    animation-delay: 0.55s;
  }
  @media(min-width:768px){ #stat-bottom-right { right: 5rem; } }

  /* ── Bottom gradient ── */
  .bottom-fade {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 12rem;
    background: linear-gradient(to top, #000 0%, transparent 100%);
    z-index: 5;
    pointer-events: none;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  /* ── Mobile nav ── */
  .hamburger-btn {
    display: none;
    flex-direction: column; justify-content: center; align-items: center;
    gap: 5px; background: none; border: none; cursor: pointer;
    padding: 4px; min-height: 44px; min-width: 44px;
  }
  @media(max-width:767px){ .hamburger-btn { display: flex; } }
  @media(max-width:767px){ .nav-cta { display: none; } }
  .hamburger-btn span {
    display: block; width: 22px; height: 2px;
    background: rgba(255,255,255,0.9); border-radius: 2px;
  }
  .mobile-nav {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(10,10,10,0.97);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .mobile-nav.open { display: block; }
  .mobile-nav-hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .mobile-nav-brand { font-size: 0.9rem; font-weight: 400; color: #fff; letter-spacing: -0.01em; text-transform: lowercase; }
  .mobile-nav-close {
    background: none; border: none;
    color: rgba(255,255,255,0.6); font-size: 1.4rem; cursor: pointer;
  }
  .mobile-nav-links { list-style: none; }
  .mobile-nav-links a {
    display: block; padding: 14px 0;
    color: rgba(255,255,255,0.8); text-decoration: none;
    font-size: 0.875rem; text-transform: lowercase;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .mobile-nav-links li:last-child a { border-bottom: none; }
  img { max-width: 100%; height: auto; }
</style>
</head>
<body>
<a href="tum.html" style="position:fixed;top:14px;left:14px;z-index:9999;display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(0,0,0,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);border-radius:999px;color:#fff;font-family:system-ui,sans-serif;font-size:0.75rem;font-weight:600;text-decoration:none;letter-spacing:0.02em;transition:background 0.2s;" onmouseover="this.style.background='rgba(0,0,0,0.85)'" onmouseout="this.style.background='rgba(0,0,0,0.6)'"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Templates</a>
<div class="hero">

  <video class="video-bg" autoplay loop muted playsinline
    src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_063509_7d167302-4fd4-480b-8260-18ab572333d4.mp4">
  </video>

  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-left">
        <svg class="nav-logo-icon" viewBox="0 0 256 256" fill="#fff">
          <path d="M128 192L128 256L64.5 256L32 223L0 192L0 128L64 128ZM256 192L256 256L192.5 256L160 223L128 192L128 128L192 128ZM128 64L128 128L64.5 128L32 95L0 64L0 0L64 0ZM256 64L256 128L192.5 128L160 95L128 64L128 0L192 0Z"/>
        </svg>
        <span class="nav-brand">securify</span>
      </div>
      <div class="nav-center">
        <a href="#">platform</a>
        <a href="#">solutions</a>
        <a href="#">company</a>
        <a href="#">support</a>
      </div>
      <button class="hamburger-btn" onclick="openMobileNav()" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <button class="nav-cta">get started</button>
    </div>
  </nav>

  <!-- Giant words -->
  <div class="hero-title" id="word-protect">protect</div>
  <div class="hero-title" id="word-your">your</div>
  <div class="hero-title" id="word-data">data</div>

  <!-- Description -->
  <p class="hero-desc">
    we can guarding your data with utmost care, empowering you with privacy everywhere
  </p>

  <!-- Stats -->
  <div class="stat-block" id="stat-top">
    <div style="display:flex;align-items:center;gap:0.75rem;justify-content:flex-end;">
      <span class="stat-divider"></span>
      <span class="stat-big">+65k</span>
    </div>
    <div class="stat-label">startups use</div>
  </div>

  <div class="stat-block" id="stat-bottom-left">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span class="stat-big">+1.5b</span>
      <span class="stat-divider" style="transform:rotate(-20deg)"></span>
    </div>
    <div class="stat-label">gb data was protected</div>
  </div>

  <div class="stat-block" id="stat-bottom-right">
    <div style="display:flex;align-items:center;gap:0.75rem;justify-content:flex-end;">
      <span class="stat-divider" style="transform:rotate(-20deg)"></span>
      <span class="stat-big">+300k</span>
    </div>
    <div class="stat-label">downloads</div>
  </div>

  <div class="bottom-fade"></div>
</div>

<div class="mobile-nav" id="mobileNav">
  <div class="mobile-nav-hdr">
    <span class="mobile-nav-brand">securify</span>
    <button class="mobile-nav-close" onclick="closeMobileNav()">✕</button>
  </div>
  <ul class="mobile-nav-links">
    <li><a href="#" onclick="closeMobileNav()">platform</a></li>
    <li><a href="#" onclick="closeMobileNav()">solutions</a></li>
    <li><a href="#" onclick="closeMobileNav()">company</a></li>
    <li><a href="#" onclick="closeMobileNav()">support</a></li>
  </ul>
</div>
<script>
  function openMobileNav() { document.getElementById('mobileNav').classList.add('open'); document.body.style.overflow='hidden'; }
  function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); document.body.style.overflow=''; }
</script>
</body>
</html>
